name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libwayland-dev \
            libxcursor-dev libxrandr-dev libxi-dev

      - name: Install the pinned Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  integration:
    name: integration (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install the pinned Rust toolchain
        run: rustup show

      - name: Install mise
        if: runner.os != 'Windows'
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}

      - name: Clippy — cockpit-terminal (integration)
        run: cargo clippy -p cockpit-terminal --all-targets --features integration -- -D warnings

      - name: Clippy — cockpit-project (integration)
        run: cargo clippy -p cockpit-project --all-targets --features integration -- -D warnings

      - name: Clippy — cockpit-lsp (integration)
        run: cargo clippy -p cockpit-lsp --all-targets --features integration -- -D warnings

      - name: Clippy — cockpit-http (integration)
        run: cargo clippy -p cockpit-http --all-targets --features integration -- -D warnings

      - name: PTY integration tests
        run: cargo test -p cockpit-terminal --features integration

      - name: mise CLI integration tests
        run: cargo test -p cockpit-project --features integration

      - name: LSP transport integration tests
        run: cargo test -p cockpit-lsp --features integration

      - name: HTTP engine integration tests
        run: cargo test -p cockpit-http --features integration --test integration_reqwest

  ui-smoke:
    name: ui-smoke (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libwayland-dev \
            libxcursor-dev libxrandr-dev libxi-dev

      - name: Install the pinned Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ui-smoke-${{ hashFiles('**/Cargo.lock') }}

      - name: Clippy — cockpit (ui-smoke)
        run: cargo clippy -p cockpit --all-targets --features ui-smoke -- -D warnings

      - name: UI smoke tests
        run: cargo test -p cockpit --features ui-smoke

  bench:
    # v0.9 M9.7 cold-start budget gate + M7.10 Windows-parity check
    # for the new cockpit-lua surface. Failing this job means an
    # extension change broke the 5 ms VM init / 50 ms total cold-start
    # budget on at least one OS.
    name: bench (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install the pinned Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: cockpit-lua cold-start budget
        run: cargo test -p cockpit-lua --features bench --release --test bench

  package:
    name: package (${{ matrix.os }})
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libwayland-dev \
            libxcursor-dev libxrandr-dev libxi-dev

      - name: Install the pinned Rust toolchain
        run: rustup show

      - name: Build release binaries
        run: cargo build --workspace --release

      - name: Upload cockpit binary
        uses: actions/upload-artifact@v4
        with:
          name: cockpit-${{ runner.os }}
          path: |
            target/release/cockpit
            target/release/cockpit.exe
          if-no-files-found: ignore
